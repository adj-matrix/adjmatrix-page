services:
  blog:
    build:
      context: .
    working_dir: /workspace
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/workspace
      - bundle-cache:/usr/local/bundle
    command: >-
      bash -lc "bundle install &&
      bundle exec jekyll serve
      --host 0.0.0.0
      --port 4000
      --livereload
      --livereload-port 35729
      --force_polling"

volumes:
  bundle-cache:
